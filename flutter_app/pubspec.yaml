name: korean_meal_planner
description: 한국 가정식 AI 식단 추천 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.0
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: fonts/NotoSansKR-Regular.ttf
        - asset: fonts/NotoSansKR-Bold.ttf
          weight: 700
    
    - family: NanumSquare
      fonts:
        - asset: fonts/NanumSquare_acR.ttf
        - asset: fonts/NanumSquare_acL.ttf
          weight: 300
        - asset: fonts/NanumSquareB.ttf
          weight: 700
        - asset: fonts/NanumSquareEB.ttf
          weight: 900
  assets:
    - .env